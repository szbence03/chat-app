<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regisztráció</title>
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo">Fórum</a>
    </header>

    <section class="auth-wrap">
      <h1>Regisztráció</h1>

      <div class="card">
        <div class="form-group">
          <label for="reg-name">Teljes név</label>
          <input type="text" id="reg-name" placeholder="Kovács Péter" />
        </div>

        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" placeholder="te@példa.hu" />
        </div>

        <div class="form-group">
          <label for="reg-pass">Jelszó</label>
          <input type="password" id="reg-pass" placeholder="min. 8 karakter" />
        </div>

        <button class="btn btn-primary" style="width: 100%">
          Fiók létrehozása
        </button>
      </div>

      <p class="auth-switch">
        Van már fiókod? <a href="login.html">Bejelentkezés</a>
      </p>
    </section>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
